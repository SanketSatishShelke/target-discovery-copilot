# dbt/models/staging/schema.yml
version: 2

models:
  - name: stg_open_targets__associations
    description: "Standardised disease-target association scores from Open Targets"
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - disease_id
              - target_id
    columns:
      - name: disease_id
        tests:
          - not_null
      - name: target_id
        tests:
          - not_null
      - name: association_score
        tests:
          - not_null
